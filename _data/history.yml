# Chronological record of what the association has done, most recent year first.
# Add a new year block at the top as time goes on.

- year: 2025
  events:
    - title: "Quantum High School"
      image: "QHS.webp"
      description: >-
        Hosted our 3rd annual Quantum High School — we spent a quarter
        designing and teaching a custom curriculum to bring the fundamentals
        of quantum computing to roughly 100 high schoolers.

- year: 2021
  events:
    - title: "Quantum Pathways Night"
      image: "white.png"
      description: >-
        Co-hosted with QFarm. Undergraduate and graduate students visited
        online booths representing four different quantum pathways, with
        professors and students on hand to answer questions about resources
        and opportunities.
    - title: "Stanford &ndash; Yale Speaker Series"
      image: "white.png"
      description: "Featured Professor Steve Girvin from Yale."
    - title: "Reading Group: Gordon Martinez-Piedra"
      image: "white.png"
      description: "A presentation on quantum computing applied to computer networks and communications."
    - title: "Introduction to Quantum Computing Talk"
      image: "white.png"
      description: >-
        A beginner-friendly talk covering the basics of quantum computing and
        its applications, plus how to get involved regardless of major.
    - title: "Reading Group: Zhiyong Zhang"
      image: "white.png"
      description: "A presentation on a quantum algorithm for finding the lowest eigenstates of a Hamiltonian."
    - title: "Quantum Conversations"
      image: "white.png"
      description: >-
        Alexy Khrabrov, joined by Brett Koonce and Mark Kasevich, discussed
        quantum mechanics, implementations, and fabrication techniques.
    - title: "Reading Group: Akshay Malhotra"
      image: "white.png"
      description: "A presentation on quantum computing in finance."
    - title: "Winter Quarter Welcome Event"
      image: "white.png"
      description: >-
        Introduced new initiatives for the quarter, including Stanford's
        first Quantum Hackathon and a Quantum Open Source Projects track.

